name: API AWS Deployment

on:
  push:
    branches:
      - master
      - main
    paths:
      - "apps/api/**"
      - "infra/terraform/**"
      - ".github/workflows/api-deploy.yml"

jobs:
  test-and-package:
    name: Test API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Build and Test
        working-directory: ./apps/api/rugbylive
        env:
          DB_URL: jdbc:h2:mem:testdb
          DB_USERNAME: sa
          DB_PASSWORD: password
          SUPABASE_PROJECT_URL: https://example.supabase.co
          CORS_ALLOWED_ORIGINS: http://localhost:8081
        run: ./mvnw clean test

  provision:
    name: Provision AWS
    needs: test-and-package
    runs-on: ubuntu-latest

    outputs:
      instance_ip: ${{ steps.outputs.outputs.instance_ip }}
      ecr_repository_url: ${{ steps.outputs.outputs.ecr_repository_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="ssh_allowed_cidr=0.0.0.0/0" \
            -var="public_key_path=$HOME/.ssh/rugbylive.pub"

      - name: Read Terraform Outputs
        id: outputs
        working-directory: infra/terraform
        run: |
          echo "instance_ip=$(terraform output -raw api_public_ip)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw api_ecr_repository_url)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy API
    needs:
      - test-and-package
      - provision
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH public key for Terraform compatibility
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PUBLIC_KEY }}" > ~/.ssh/rugbylive.pub

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REPOSITORY_URI: ${{ needs.provision.outputs.ecr_repository_url }}
        run: |
          docker build -t $ECR_REPOSITORY_URI:${{ github.sha }} ./apps/api/rugbylive
          docker tag $ECR_REPOSITORY_URI:${{ github.sha }} $ECR_REPOSITORY_URI:latest
          docker push $ECR_REPOSITORY_URI:${{ github.sha }}
          docker push $ECR_REPOSITORY_URI:latest

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ needs.provision.outputs.instance_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          debug: true
          script: |
            set -e

            mkdir -p /opt/rugbylive
            cd /opt/rugbylive

            aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin ${{ needs.provision.outputs.ecr_repository_url }}

            cat <<EOF > Caddyfile
            api.rugbylive.jordanvoss.dev {
                reverse_proxy api:8080
            }
            EOF

            cat <<EOF > docker-compose.yml
            services:
              api:
                container_name: rugbylive-api
                image: ${{ needs.provision.outputs.ecr_repository_url }}:latest
                environment:
                  DB_URL: ${{ secrets.DB_URL }}
                  DB_USERNAME: ${{ secrets.DB_USERNAME }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
                  CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
                restart: unless-stopped

              caddy:
                container_name: rugbylive-caddy
                image: caddy:2
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile:ro
                  - caddy_data:/data
                  - caddy_config:/config
                depends_on:
                  - api
                restart: unless-stopped

            volumes:
              caddy_data:
              caddy_config:
            EOF

            docker compose pull
            docker compose up -d
            docker image prune -f