name: API AWS Deployment

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # JAVA TEST
      # -------------------------
      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin

      - name: Test API
        working-directory: apps/api/rugbylive
        run: ./mvnw clean test

      # -------------------------
      # AWS + TERRAFORM
      # -------------------------
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v3

      - name: Write SSH public key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PUBLIC_KEY }}" > ~/.ssh/rugbylive.pub

      - name: Terraform Apply
        id: tf
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="public_key_path=$HOME/.ssh/rugbylive.pub"

          echo "IP=$(terraform output -raw api_public_ip)" >> $GITHUB_OUTPUT
          echo "ECR=$(terraform output -raw api_ecr_repository_url)" >> $GITHUB_OUTPUT

      # -------------------------
      # BUILD + PUSH IMAGE
      # -------------------------
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        run: |
          docker build -t ${{ steps.tf.outputs.ECR }}:latest ./apps/api/rugbylive
          docker push ${{ steps.tf.outputs.ECR }}:latest

      # -------------------------
      # SSH DEPLOY
      # -------------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.tf.outputs.IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Install Docker + AWS CLI ONLY if missing
            if ! command -v docker >/dev/null; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg unzip

              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list

              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

              sudo systemctl enable --now docker
              sudo usermod -aG docker ubuntu
            fi

            if ! command -v aws >/dev/null; then
              cd /tmp
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
              unzip -q awscliv2.zip
              sudo ./aws/install
            fi

            mkdir -p ~/rugbylive
            cd ~/rugbylive

            aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin ${{ steps.tf.outputs.ECR }}

            cat <<EOF > docker-compose.yml
            services:
              rugbylive-api:
                container_name: rugbylive-api
                image: ${{ steps.tf.outputs.ECR }}:latest
                ports:
                  - "8080:8080"
                environment:
                  DB_URL: ${{ secrets.DB_URL }}
                  DB_USERNAME: ${{ secrets.DB_USERNAME }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
                  CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
                restart: always

              caddy:
                container_name: rugbylive-caddy
                image: caddy:2
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile
                  - caddy_data:/data
                restart: always

            volumes:
              caddy_data:
            EOF

            cat <<EOF > Caddyfile
              api.rugbylive.jordanvoss.dev {
                  reverse_proxy rugbylive-api:8080
              }
            EOF

            docker compose pull
            docker compose up -d