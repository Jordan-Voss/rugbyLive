name: CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/app/**"
      - ".github/workflows/ci.yml"

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api/rugbylive
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Run API tests
        env:
          DB_URL: jdbc:h2:mem:testdb
          DB_USERNAME: sa
          DB_PASSWORD: password
          SUPABASE_PROJECT_URL: https://example.supabase.co
          SUPABASE_JWKS_URI: https://example.supabase.co/auth/v1/.well-known/jwks.json
          CORS_ALLOWED_ORIGINS: http://localhost:8081
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: ./mvnw clean test

  app:
    name: App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint